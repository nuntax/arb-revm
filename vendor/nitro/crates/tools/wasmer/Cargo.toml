petgraph = "0.8.3"
phf = "0.13.1"
pin-project = "1.0.12"
pin-project-lite = "0.2.10"
pin-utils = "0.1.0"
predicates = "3.1.3"
pretty_assertions = "1.4.0"
proc-macro-error2 = "2.0.1"
proc-macro2 = "1"
quote = "1.0.20"
rand = "0.10"
rangemap = "1.7.1"
rayon = "1.7.0"
regex = "1.11"
region = "3.0"
replace_with = "0.1.7"
reqwest = { version = "0.13.0", default-features = false }
rkyv = { version = "0.8.13", features = ["indexmap-2", "bytes-1"] }
rustc-demangle = "0.1"
rustc_version = "0.4"
rusty_jsc = "0.1.0"
rusty_pool = "0.7.0"
