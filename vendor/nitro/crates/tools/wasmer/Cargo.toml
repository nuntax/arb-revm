ignore = "0.4"
indicatif = "0.18.3"
indexmap = "2"
inline-c = "0.1.7"
inkwell = { version = "0.8.0", default-features = false }
insta = "1.45.0"
interfaces = "0.0.9"
ipnet = "2.10.1"
iprange = "0.6.7"
itertools = "0.14"
js-sys = "0.3.77"
leb128 = "0.2"
