[workspace]
resolver = "2"
members = [
	"lib/api",
	"lib/api/macro-wasmer-universal-test",
	"lib/compiler",
	"lib/compiler-cranelift",
	"lib/compiler-singlepass",
	"lib/derive",
	"lib/types",
	"lib/vm",
]

[workspace.package]
authors = ["Wasmer Engineering Team <engineering@wasmer.io>"]
edition = "2024"
homepage = "https://wasmer.io/"
license = "MIT"
repository = "https://github.com/wasmerio/wasmer"
rust-version = "1.91"
version = "7.1.0"

[workspace.dependencies]
# Repo-local crates
wasmer-package = { version = "0.701.0", path = "lib/package" }
wasmer-config = { path = "./lib/config" }
wasmer-wasix = { path = "./lib/wasix" }
wasmer-sdk = { path = "./lib/sdk" }

# Wasmer-owned crates
webc = "=11.0.0"
shared-buffer = "0.1.4"
loupe = "0.2.0"

# Third-party crates
anyhow = "1.0"
assert-panic = "1.0.1"
assert_cmd = "2.2.0"
async-trait = "0.1.68"
async-tungstenite = "0.33.0"
axum = { version = "=0.6.9", default-features = false }
backtrace = "0.3"
base64 = "0.22.1"
bincode = "2.0.1"
bindgen = "0.72.1"
bitflags = "2.11.0"
blake3 = "1.0"
build-deps = "0.1.4"
bus = "2.4.1"
bytecheck = { version = "0.8.2" }
byteorder = "1.3"
bytes = "1.11.1"
bytesize = "2.3.1"
cargo_metadata = "0.23.1"
cbindgen = { version = "0.29", default-features = false }
cc = "1.2.47"
cfg-if = "1.0"
chrono = { version = "0.4.38", default-features = false }
ciborium = "0.2.2"
clap = { version = "4.5.53", default-features = false }
clap_builder = { version = "4.5.53" }
clap_complete = "4.5.61"
clap_derive = { version = "4.5.49" }
clap_lex = { version = "1" }
clap_mangen = "0.2.31"
cmake = "0.1.50"
colored = "3.0.0"
comfy-table = "7.2.1"
compiletest_rs = "0.11.2"
console = "0.16.1"
console-subscriber = "0.5.0"
cooked-waker = "5"
corosensei = "0.3.0"
cranelift-codegen = { version = "=0.129.1", default-features = false }
cranelift-entity = { version = "=0.129.1", default-features = false }
cranelift-frontend = { version = "=0.129.1", default-features = false }
criterion = { version = "0.8.1", default-features = false }
crossbeam-channel = "0.5.15"
crossbeam-queue = "0.3.8"
cynic = { version = "3.13.0", default-features = false }
dashmap = "6.1.0"
derive_builder = "0.20.2"
derive_more = { version = "2.0.1", features = ["debug", "display"] }
dialoguer = "0.12.0"
dirs = "6.0.0"
dotenvy = "0.15.7"
dunce = "1.0.4"
dynasm = "5.0.0"
dynasmrt = "5.0.0"
enum-iterator = "2.3.0"
enumset = "1.1.0"
env_logger = { version = "0.11.5", default-features = false }
field-offset = "0.3.3"
filetime = "0.2.18"
flate2 = "1.0.34"
zstd = "0.13.2"
fnv = "1.0.3"
fs_extra = { version = "1.3.0" }
futures = "0.3.30"
futures-util = { version = "0.3.31" }
getrandom = "0.4.1"
gimli = { version = "0.33.0" }
git-version = "0.3.9"
glob = "0.3"
graphql-ws-client = "0.12.0"
